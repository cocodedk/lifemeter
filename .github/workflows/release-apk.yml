# Build a signed release APK on push/merge to master.
# Requires GitHub secrets: KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
# To create KEYSTORE_BASE64: base64 -w 0 your-release.keystore (linux)

name: Build signed release APK

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

env:
  KEYSTORE_PATH: ${{ github.workspace }}/app/release.keystore

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Verify signing secrets
        run: |
          missing=0
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then echo "Missing secret: KEYSTORE_BASE64"; missing=1; fi
          if [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]; then echo "Missing secret: KEYSTORE_PASSWORD"; missing=1; fi
          if [ -z "${{ secrets.KEY_ALIAS }}" ]; then echo "Missing secret: KEY_ALIAS"; missing=1; fi
          if [ -z "${{ secrets.KEY_PASSWORD }}" ]; then echo "Missing secret: KEY_PASSWORD"; missing=1; fi
          if [ "$missing" -ne 0 ]; then exit 1; fi

      - name: Read and bump version
        id: version
        run: |
          VERSION=$(tr -d '\r\n' < version.txt)
          if [[ ! "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Invalid version format in version.txt: $VERSION"
            exit 1
          fi
          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"
          BUMP="${{ github.event.inputs.bump || 'patch' }}"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            *) echo "Unsupported bump type: $BUMP"; exit 1 ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "$NEW_VERSION" > version.txt
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}" || true
          git push || true

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$KEYSTORE_PATH"

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --no-configuration-cache
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.version.outputs.version }}

      - name: Copy APK with stable name
        run: cp app/build/outputs/apk/release/app-release.apk LifeMeter.apk

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: LifeMeter-${{ steps.version.outputs.version }}
          path: LifeMeter.apk

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          files: LifeMeter.apk
          draft: false
          generate_release_notes: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
