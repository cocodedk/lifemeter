# Build a signed release APK on push/merge to master.
# Requires GitHub secrets: KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
# To create KEYSTORE_BASE64: base64 -w 0 your-release.keystore (linux)

name: Build signed release APK

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

env:
  KEYSTORE_PATH: ${{ github.workspace }}/app/release.keystore
  KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
  KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
  KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
  VERSION_CODE: ${{ github.run_number }}
  VERSION_NAME: "1.0.${{ github.run_number }}"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Verify signing secrets
        run: |
          missing=0
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then echo "Missing secret: KEYSTORE_BASE64"; missing=1; fi
          if [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]; then echo "Missing secret: KEYSTORE_PASSWORD"; missing=1; fi
          if [ -z "${{ secrets.KEY_ALIAS }}" ]; then echo "Missing secret: KEY_ALIAS"; missing=1; fi
          if [ -z "${{ secrets.KEY_PASSWORD }}" ]; then echo "Missing secret: KEY_PASSWORD"; missing=1; fi
          if [ "$missing" -ne 0 ]; then exit 1; fi

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$KEYSTORE_PATH"

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --no-configuration-cache

      - name: Copy APK with stable name
        run: cp app/build/outputs/apk/release/app-release.apk LifeMeter.apk

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: Release ${{ env.VERSION_NAME }}
          files: LifeMeter.apk
          draft: false
          generate_release_notes: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
