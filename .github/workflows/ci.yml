name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches-ignore: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Run unit tests
        run: ./gradlew :app:test --no-daemon
